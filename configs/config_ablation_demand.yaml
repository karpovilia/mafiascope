# ── ABLATION: demand characteristic in social_map (P1-3a) ───────────────
#
# Copy of config_deepseek.yaml that keeps the ORIGINAL corpus wording of the
# social_map probe, including the suggestive sentence
#   «Если ты кого-то подозреваешь, он может это чувствовать.»
# Reviewers (R1 W3, DA C3a) flagged this sentence as a demand characteristic
# that primes agents to expect being suspected — exactly the direction of
# finding F3.  The sentence has been REMOVED from the default battery
# (config_deepseek.yaml / config.yaml); this config exists solely to run an
# old-vs-new phrasing ablation:
#
#   old phrasing:  python main.py --config configs/config_ablation_demand.yaml
#   new phrasing:  python main.py --config configs/config_deepseek.yaml
#
# Everything except the social_map question is identical to
# config_deepseek.yaml.  Do NOT use this config for the main corpus.

game:
  max_rounds: 15
  language: ru
  detailed_reasoning: true
  intro_round: true

backends:
  deepseek:
    type: deepseek
    model: deepseek-chat
    api_key: ${DEEPSEEK_API_KEY}
    max_tokens: 400
    timeout: 90

players:
  - role: Mafia
    backend: deepseek
    personality: { O: 70, C: 40, E: 85, A: 30, N: 60 }   # bold manipulator

  - role: Mafia
    backend: deepseek
    personality: { O: 50, C: 75, E: 40, A: 65, N: 30 }   # quiet strategist

  - role: Doctor
    backend: deepseek
    personality: { O: 60, C: 80, E: 50, A: 90, N: 45 }   # careful protector

  - role: Villager
    backend: deepseek
    personality: { O: 80, C: 55, E: 70, A: 60, N: 35 }   # curious analyst

  - role: Villager
    backend: deepseek
    personality: { O: 45, C: 60, E: 30, A: 50, N: 70 }   # anxious introvert

  - role: Villager
    backend: deepseek
    personality: { O: 65, C: 35, E: 90, A: 40, N: 50 }   # loud hothead

  - role: Villager
    backend: deepseek
    personality: { O: 55, C: 70, E: 55, A: 75, N: 25 }   # calm peacemaker

introspection:
  enabled: true
  after_each_message: true
  after_each_round: true
  probes:
    - id: role_assessment
      max_tokens: 960
      question: >
        Ты — {player}. Вот что ты думал о ролях игроков в прошлый раз:
        {last_role_assessment}

        Теперь, учитывая новую информацию, для каждого живого игрока
        ({players}), ВКЛЮЧАЯ себя, ответь: какая у него роль,
        насколько ты уверен (0-100) и почему (кратко).
        Отвечай ТОЛЬКО JSON:
        [{{"player": "...", "guessed_role": "Mafia|Villager|Doctor|Unknown", "confidence": N, "reason": "..."}}, ...]

    - id: suspicion_ranking
      question: >
        Расположи живых игроков ({players}) от самого подозрительного
        к наименее подозрительному.
        Отвечай ТОЛЬКО JSON: [{{"player": "...", "score": N}}, ...]

    # ABLATION PROBE — original corpus wording WITH the demand-characteristic
    # sentence (kept intentionally; removed in config_deepseek.yaml).
    - id: social_map
      max_tokens: 960
      question: >
        Ты — {player}. Вот твоя текущая оценка ролей:
        {prev_role_assessment}

        В прошлый раз ты думал, что игроки относятся к тебе так:
        {last_social_map}

        Учитывая новую информацию, как теперь каждый живой игрок
        ({players}) относится к ТЕБЕ? Если ты кого-то подозреваешь,
        он может это чувствовать.
        Отвечай ТОЛЬКО JSON:
        {{
          "toward_me": [{{"player": "...", "attitude": "trusts|neutral|suspects", "confidence": N, "reason": "..."}}, ...]
        }}

    - id: personality_profile
      max_tokens: 960
      question: >
        Ты — {player}. В прошлый раз ты так оценивал характеры:
        {last_personality_profile}

        Учитывая новое поведение, для каждого живого игрока ({players}),
        КРОМЕ себя, оцени его Big Five (0-100).
        O = Открытость, C = Добросовестность, E = Экстраверсия,
        A = Доброжелательность, N = Нейротизм.
        Отвечай ТОЛЬКО JSON:
        [{{"player": "...", "O": N, "C": N, "E": N, "A": N, "N": N, "summary": "..."}}, ...]

    - id: planned_action
      when: own_turn
      max_tokens: 1024
      question: >
        Ты — {player}. Вот твоя модель мира:

        Оценка ролей: {prev_role_assessment}

        Как ты думаешь, игроки относятся к тебе:
        {prev_social_map}

        Учитывая всё это, какое действие ты планируешь предпринять
        следующим и почему? Объясни стратегию.
        Отвечай ТОЛЬКО JSON: {{"action": "...", "target": "...", "reasoning": "..."}}

logging:
  log_dir: ../logs
  console_level: info
