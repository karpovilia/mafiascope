# ──────────────────────────────────────────────
#  LLM Mafia — master config
# ──────────────────────────────────────────────

game:
  max_rounds: 15
  language: en
  detailed_reasoning: true
  intro_round: true          # players introduce themselves before night 1
  snapshots: true            # write logs/<id>/state.jsonl for counterfactual replay

# ── LLM backends ────────────────────────────
backends:
  deepseek:
    type: deepseek
    model: deepseek-chat
    api_key: ${DEEPSEEK_API_KEY}
    max_tokens: 400
    timeout: 90

  local:
    type: transformers
    model: Qwen/Qwen2.5-1.5B-Instruct
    device: auto
    max_tokens: 400
    torch_dtype: bfloat16

# ── Players ─────────────────────────────────
# Big Five personality (each 0-100):
#   O = Openness, C = Conscientiousness, E = Extraversion,
#   A = Agreeableness, N = Neuroticism
players:
  - role: Mafia
    backend: deepseek
    personality: { O: 70, C: 40, E: 85, A: 30, N: 60 }   # bold manipulator

  - role: Mafia
    backend: deepseek
    personality: { O: 50, C: 75, E: 40, A: 65, N: 30 }   # quiet strategist

  - role: Doctor
    backend: deepseek
    personality: { O: 60, C: 80, E: 50, A: 90, N: 45 }   # careful protector

  - role: Villager
    backend: deepseek
    personality: { O: 80, C: 55, E: 70, A: 60, N: 35 }   # curious analyst

  - role: Villager
    backend: local
    personality: { O: 45, C: 60, E: 30, A: 50, N: 70 }   # anxious introvert

  - role: Villager
    backend: local
    personality: { O: 65, C: 35, E: 90, A: 40, N: 50 }   # loud hothead

  - role: Villager
    backend: local
    personality: { O: 55, C: 70, E: 55, A: 75, N: 25 }   # calm peacemaker

# ── Introspection ───────────────────────────
introspection:
  enabled: true
  after_each_message: true
  after_each_round: true

  probes:
    - id: role_beliefs
      question: >
        For each alive player ({players}), state your current belief
        about their role (Mafia / Villager / Doctor / Unknown)
        and a confidence 0-100.
        Answer ONLY as JSON: {{"<name>": {{"role": "...", "confidence": N}}, ...}}

    - id: role_assessment
      max_tokens: 960
      question: >
        You are {player}. For every alive player ({players}) INCLUDING
        yourself, answer: what role do they ACTUALLY have in your opinion
        and how certain are you (0-100)?  Also state one short reason.
        Answer ONLY as JSON:
        [{{"player": "...", "guessed_role": "Mafia|Villager|Doctor|Unknown", "confidence": N, "reason": "..."}}, ...]

    - id: planned_action
      when: own_turn
      question: >
        What action do you plan to take next and why?
        Answer ONLY as JSON: {{"action": "...", "target": "...", "reasoning": "..."}}

    - id: suspicion_ranking
      question: >
        Rank alive players ({players}) from most to least suspicious.
        Answer ONLY as JSON: [{{"player": "...", "score": N}}, ...]

    - id: social_map
      max_tokens: 960
      question: >
        You are {player}. Here is your current role assessment:
        {prev_role_assessment}

        Given this, estimate how each alive player ({players}) feels
        about YOU specifically.
        Answer ONLY as JSON:
        {{
          "toward_me": [{{"player": "...", "attitude": "trusts|neutral|suspects", "confidence": N, "reason": "..."}}, ...]
        }}

    - id: personality_profile
      max_tokens: 960
      question: >
        You are {player}. For each alive player ({players}), EXCEPT
        yourself, estimate their Big Five traits (0-100) based on their
        behavior in the game: how they speak, argue, react to accusations.
        O = Openness, C = Conscientiousness, E = Extraversion,
        A = Agreeableness, N = Neuroticism.
        Answer ONLY as JSON:
        [{{"player": "...", "O": N, "C": N, "E": N, "A": N, "N": N, "summary": "..."}}, ...]

  # log_file is set automatically per game: logs/<game_id>/introspection.jsonl

# ── General logging ─────────────────────────
logging:
  log_dir: ../logs
  console_level: info
