# Multilingual Qwen3-8B outcome experiment — language=de
# Base: config_v100_qwen7b.yaml. Only `language` + probe wording vary.
# Model resolves from local HF cache on tesla (models--Qwen--Qwen3-8B).
game:
  max_rounds: 15
  language: de
  detailed_reasoning: true
  intro_round: true
  snapshots: true
backends:
  local:
    type: transformers_batched
    model: /home/iakarpov/hf_mirror/qwen_Qwen3-8B
    device: auto
    max_tokens: 400
    torch_dtype: float16
    batch_size: 8
    batch_timeout: 0.3
players:
- role: Mafia
  backend: local
  personality:
    O: 70
    C: 40
    E: 85
    A: 30
    N: 60
- role: Mafia
  backend: local
  personality:
    O: 50
    C: 75
    E: 40
    A: 65
    N: 30
- role: Doctor
  backend: local
  personality:
    O: 60
    C: 80
    E: 50
    A: 90
    N: 45
- role: Villager
  backend: local
  personality:
    O: 80
    C: 55
    E: 70
    A: 60
    N: 35
- role: Villager
  backend: local
  personality:
    O: 45
    C: 60
    E: 30
    A: 50
    N: 70
- role: Villager
  backend: local
  personality:
    O: 65
    C: 35
    E: 90
    A: 40
    N: 50
- role: Villager
  backend: local
  personality:
    O: 55
    C: 70
    E: 55
    A: 75
    N: 25
introspection:
  enabled: true
  after_each_message: true
  after_each_round: true
  probes:
  - id: role_assessment
    max_tokens: 960
    question: 'Du bist {player}. Deine vorherige Einschätzung der Rollen war: {last_role_assessment} Bewerte nun mit den neuen Informationen jeden lebenden Spieler ({players}), DICH selbst EINGESCHLOSSEN, neu. Halte die guessed_role-Werte genau wie vorgegeben auf Englisch; schreibe reason auf Deutsch. Antworte NUR als JSON: [{{"player": "...", "guessed_role": "Mafia|Villager|Doctor|Unknown", "confidence": N, "reason": "..."}}, ...]'
  - id: suspicion_ranking
    question: 'Ordne die lebenden Spieler ({players}) vom verdächtigsten zum am wenigsten verdächtigen. Antworte NUR als JSON: [{{"player": "...", "score": N}}, ...]'
  - id: planned_action
    when: own_turn
    max_tokens: 1024
    question: 'Du bist {player}. Dein Weltmodell: Rollen: {prev_role_assessment} Welche Aktion planst du als Nächstes und warum? Schreibe reasoning auf Deutsch. Antworte NUR als JSON: {{"action": "...", "target": "...", "reasoning": "..."}}'
  - id: social_map
    max_tokens: 960
    question: 'Du bist {player}. Dies ist deine aktuelle Rolleneinschätzung: {prev_role_assessment}

      Letztes Mal dachtest du, die Spieler empfänden dir gegenüber so: {last_social_map}

      Wie steht nun mit den neuen Informationen jeder lebende Spieler ({players}) konkret zu DIR? Halte die attitude-Werte genau wie vorgegeben auf Englisch; schreibe reason auf Deutsch. Antworte NUR als JSON: {{"toward_me": [{{"player": "...", "attitude": "trusts|neutral|suspects", "confidence": N, "reason": "..."}}, ...]}}'
logging:
  log_dir: ../logs
  console_level: info
