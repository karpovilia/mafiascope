# ── A/B invasiveness experiment 2026-07-18 — ARM B: unprobed ─
#
# Derived from config_en_demo.yaml (same 7-player setup, same
# deepseek-chat backend).  Differences from en_demo:
#   * game.snapshots: false  (disk economy; no effect on API calls)
# The two arm files ab_probed.yaml / ab_unprobed.yaml are identical
# except the introspection block (enabled + probes).  Driver:
# mafia2/src/ab_invasiveness/run_ab.py (randomized 240-slot sequence,
# seed 20260718, arms interleaved in one parallel pool).

game:
  max_rounds: 15
  language: en
  detailed_reasoning: true
  intro_round: true
  snapshots: false           # A/B run: no state.jsonl (disk economy only)

backends:
  deepseek:
    type: deepseek
    model: deepseek-chat
    api_key: ${DEEPSEEK_API_KEY}
    max_tokens: 400
    timeout: 90

players:
  - role: Mafia
    backend: deepseek
    personality: { O: 70, C: 40, E: 85, A: 30, N: 60 }   # bold manipulator

  - role: Mafia
    backend: deepseek
    personality: { O: 50, C: 75, E: 40, A: 65, N: 30 }   # quiet strategist

  - role: Doctor
    backend: deepseek
    personality: { O: 60, C: 80, E: 50, A: 90, N: 45 }   # careful protector

  - role: Villager
    backend: deepseek
    personality: { O: 80, C: 55, E: 70, A: 60, N: 35 }   # curious analyst

  - role: Villager
    backend: deepseek
    personality: { O: 45, C: 60, E: 30, A: 50, N: 70 }   # anxious introvert

  - role: Villager
    backend: deepseek
    personality: { O: 65, C: 35, E: 90, A: 40, N: 50 }   # loud hothead

  - role: Villager
    backend: deepseek
    personality: { O: 55, C: 70, E: 55, A: 75, N: 25 }   # calm peacemaker

introspection:
  enabled: false
  after_each_message: true
  after_each_round: true
  probes: []

logging:
  log_dir: ../logs
  console_level: info
