# Resistance-lite on Qwen3-8B. Group dynamics without elimination (5 seats,
# 2 Spies / 3 Resistance). Model + sampling + probe battery byte-identical to
# config_v100_qwen7b.yaml; game_type routes to ResistanceGame. `model` = HPC hf_mirror weights (offline).
game:
  max_rounds: 5
  language: en
  intro_round: true
  game_type: resistance
backends:
  local:
    type: transformers_batched
    model: /home/iakarpov/hf_mirror/qwen_Qwen3-8B
    device: auto
    max_tokens: 400
    torch_dtype: float16
    batch_size: 8
    batch_timeout: 0.3
players:
- { role: Spy,        backend: local, personality: { O: 70, C: 40, E: 85, A: 30, N: 60 } }
- { role: Spy,        backend: local, personality: { O: 50, C: 75, E: 40, A: 65, N: 30 } }
- { role: Resistance, backend: local, personality: { O: 80, C: 55, E: 70, A: 60, N: 35 } }
- { role: Resistance, backend: local, personality: { O: 45, C: 60, E: 30, A: 50, N: 70 } }
- { role: Resistance, backend: local, personality: { O: 55, C: 70, E: 55, A: 75, N: 25 } }
introspection:
  enabled: true
  after_each_message: true
  after_each_round: true
  probes:
  - id: role_assessment
    max_tokens: 960
    question: 'You are {player}. Previous assessment: {last_role_assessment} Now reassess each alive player
      ({players}) INCLUDING yourself. Answer ONLY as JSON: [{{"player": "...", "guessed_role": "Mafia|Villager|Doctor|Unknown",
      "confidence": N, "reason": "..."}}, ...]

      '
  - id: suspicion_ranking
    question: 'Rank alive players ({players}) from most to least suspicious. Answer ONLY as JSON: [{{"player":
      "...", "score": N}}, ...]

      '
  - id: planned_action
    when: own_turn
    max_tokens: 1024
    question: 'You are {player}. Your world model: Roles: {prev_role_assessment} What action do you plan
      next and why? Answer ONLY as JSON: {{"action": "...", "target": "...", "reasoning": "..."}}

      '
  - id: social_map
    max_tokens: 960
    question: "You are {player}. Here is your current role assessment: {prev_role_assessment}\nLast time\
      \ you thought players felt about you like this: {last_social_map}\nGiven the new information, how\
      \ does each alive player ({players}) feel about YOU specifically now? Answer ONLY as JSON: {{\n\
      \  \"toward_me\": [{{\"player\": \"...\", \"attitude\": \"trusts|neutral|suspects\", \"confidence\"\
      : N, \"reason\": \"...\"}}, ...]\n}}\n"
logging:
  log_dir: logs
  console_level: info
