# Multilingual Qwen3-8B outcome experiment — language=zh
# Base: config_v100_qwen7b.yaml. Only `language` + probe wording vary.
# Model resolves from local HF cache on tesla (models--Qwen--Qwen3-8B).
game:
  max_rounds: 15
  language: zh
  detailed_reasoning: true
  intro_round: true
  snapshots: true
backends:
  local:
    type: transformers_batched
    model: Qwen/Qwen3-8B
    device: auto
    max_tokens: 400
    torch_dtype: float16
    batch_size: 8
    batch_timeout: 0.3
players:
- role: Mafia
  backend: local
  personality:
    O: 70
    C: 40
    E: 85
    A: 30
    N: 60
- role: Mafia
  backend: local
  personality:
    O: 50
    C: 75
    E: 40
    A: 65
    N: 30
- role: Doctor
  backend: local
  personality:
    O: 60
    C: 80
    E: 50
    A: 90
    N: 45
- role: Villager
  backend: local
  personality:
    O: 80
    C: 55
    E: 70
    A: 60
    N: 35
- role: Villager
  backend: local
  personality:
    O: 45
    C: 60
    E: 30
    A: 50
    N: 70
- role: Villager
  backend: local
  personality:
    O: 65
    C: 35
    E: 90
    A: 40
    N: 50
- role: Villager
  backend: local
  personality:
    O: 55
    C: 70
    E: 55
    A: 75
    N: 25
introspection:
  enabled: true
  after_each_message: true
  after_each_round: true
  probes:
  - id: role_assessment
    max_tokens: 960
    question: '你是{player}。你上次对各玩家身份的判断是：{last_role_assessment} 现在结合新信息，对每一名存活玩家（{players}），包括你自己，重新评估其身份。guessed_role 的取值保持英文，与所给完全一致；reason 用中文写。只回答 JSON：[{{"player": "...", "guessed_role": "Mafia|Villager|Doctor|Unknown", "confidence": N, "reason": "..."}}, ...]'
  - id: suspicion_ranking
    question: '把存活玩家（{players}）从最可疑到最不可疑排序。只回答 JSON：[{{"player": "...", "score": N}}, ...]'
  - id: planned_action
    when: own_turn
    max_tokens: 1024
    question: '你是{player}。你的世界模型：身份判断：{prev_role_assessment} 你接下来计划采取什么行动，为什么？reasoning 用中文写。只回答 JSON：{{"action": "...", "target": "...", "reasoning": "..."}}'
  - id: social_map
    max_tokens: 960
    question: '你是{player}。这是你当前对各玩家身份的判断：{prev_role_assessment}

      上次你认为其他玩家对你的态度是：{last_social_map}

      结合新信息，现在每一名存活玩家（{players}）对你本人具体是什么态度？attitude 的取值保持英文，与所给完全一致；reason 用中文写。只回答 JSON：{{"toward_me": [{{"player": "...", "attitude": "trusts|neutral|suspects", "confidence": N, "reason": "..."}}, ...]}}'
logging:
  log_dir: ../logs
  console_level: info
